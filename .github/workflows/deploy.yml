name: Deploy Hexo Blog

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 清理缓存
        run: npx hexo clean

      - name: 生成静态文件
        run: npx hexo generate

      - name: 构建
        run: npx hexo clean && npx hexo generate

      - name: 压缩静态资源
        run: npx gulp

      - name: 部署到 main 分支
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: main
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.run_id }} @ ${{ github.event.head_commit.timestamp }}'
          
      - name: 刷新 EdgeOne 缓存
        env:
          SECRET_ID: ${{ secrets.SECRETID }}
          SECRET_KEY: ${{ secrets.SECRETKEY }}
          ZONE_ID: ${{ secrets.EDGEONE_ZONE_ID }}
        run: |
          pip install tencentcloud-sdk-python-teo --quiet
          python3 - <<'EOF'
          import os
          from tencentcloud.common import credential
          from tencentcloud.teo.v20220901 import teo_client, models

          cred = credential.Credential(os.environ["SECRET_ID"], os.environ["SECRET_KEY"])
          client = teo_client.TeoClient(cred, "ap-guangzhou")

          req = models.CreatePurgeTaskRequest()
          req.ZoneId = os.environ["ZONE_ID"]
          req.Type = "purge_prefix"
          req.Targets = ["https://luofish.com/"]

          resp = client.CreatePurgeTask(req)
          print("缓存刷新成功：", resp.JobId)
          EOF