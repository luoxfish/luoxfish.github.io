# --------------------------------------
# Hexo Butterfly 主题配置文件
# 如有疑问请参考官方文档
# 中文：https://butterfly.js.org/
# English：https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏 Logo 图片
  logo:
  # 是否显示站点标题
  display_title: true
  # 是否显示文章标题
  display_post_title: true
  # 是否固定导航栏
  fixed: false

menu:  
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  清单||fa fa-heartbeat:
    音乐: /music/ || fas fa-music
    照片: /Gallery/ || fas fa-images
    电影: /movies/ || fas fa-video
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart


# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题：darker / pale night / light / ocean / false
  theme: light
  # 是否启用 Mac 风格
  macStyle: true
  # 代码块高度限制（单位：px）
  height_limit: 370
  # 是否自动换行
  word_wrap: trus

  # 工具栏
  # 是否显示复制按钮
  copy: true
  # 是否显示语言
  language: true
  # true：默认折叠代码块 | false：默认展开 | none：展开且隐藏按钮
  shrink: false
  # 是否启用全屏模式
  fullpage: false

# 社交媒体链接
# 格式：
#   icon: 链接 || 描述 || 颜色
social:
  # fab fa-github: https://github.com/xxxxx || Github || '#24292e'
  # fas fa-envelope: mailto:xxxxxx@gmail.com || 邮箱 || '#4a7dbe'
  fa-brands fa-bilibili: https://space.bilibili.com/454341051 || BiliBili || "#24292e"

# --------------------------------------
# 图片设置
# --------------------------------------

# 网站 favicon
favicon: /img/favicon.png

avatar:
  # 头像图片
  img: https://upyun.lauro.cn/blog/2026/01/2026-01-04-b4nTEW.jpg
  # 是否启用头像特效
  effect: false

# 是否禁用顶部横幅图片
disable_top_img: false

# 当页面未设置横幅时使用的默认横幅
default_top_img:

# 首页横幅
index_img: https://upyun.lauro.cn/blog/2026/01/2026-01-04-3TvI0w.png

# 归档页横幅
archive_img:

# 注意：是 tag 页面，不是 tags 页面
tag_img:

# 为每个标签单独设置横幅
# 格式：
#  - tag name: xxxxx
tag_per_img:

# 注意：是 category 页面，不是 categories 页面
category_img:

# 为每个分类单独设置横幅
# 格式：
#  - category name: xxxxx
category_per_img:

# 页脚背景图片
footer_img: false

# 网站背景
# 可设置为颜色、图片 URL，或数组（每次刷新随机）
background:

cover:
  # 是否启用封面
  index_enable: true
  aside_enable: true
  archives_enable: true
  # 未设置时使用的默认封面
  default_cover:
    # - xxx.jpg

# 替换损坏图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 简单 404 页面
error_404:
  enable: true
  subtitle: '页面未找到'
  background: /img/error-page.png

post_meta:
  # 首页文章信息
  page:
    # created / updated / both
    date_type: created
    # date / relative
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    # left / center
    position: left
    # created / updated / both
    date_type: both
    # date / relative
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页顶部信息距离顶部的距离
index_site_info_top:
# 首页顶部图片高度
index_top_img_height:

# 首页副标题
subtitle:
  enable: false
  # 是否启用打字机效果
  effect: true
  # typed.js 自定义配置
  typed_option:
  # 第三方一言 API（仅中文）
  # false 关闭
  # 1 hitokoto.cn
  # 2 api.aa1.cn
  # 3 jinrishici.com
  source: false
  # 关闭打字机效果时仅显示第一行
  sub:

# 首页文章布局
# 1 左图右文
# 2 右图左文
# 3 左右交替
# 4 上图下文
# 5 信息覆盖在封面上
# 6 瀑布流（图上文下）
# 7 瀑布流（信息覆盖）
index_layout: 3

# 首页文章摘要显示方式
# 1 description
# 2 description + auto_excerpt
# 3 auto_excerpt（默认）
# false 不显示
index_post_content:
  method: 3
  # 摘要长度
  length: 500

# --------------------------------------
# 文章设置
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  # 仅文章有效
  style_simple: false
  # 滚动百分比
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏功能
reward:
  enable: false
  text:
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: 微信
    # - img: /img/alipay.jpg
    #   link:
    #   text: 支付宝

# 文章在线编辑
post_edit:
  enable: false
  # GitHub 编辑地址
  url:

# 相关文章推荐
related_post:
  enable: true
  # 显示数量
  limit: 6
  # created / updated
  date_type: created

# 上一篇 / 下一篇文章顺序
# 1 下一篇指向旧文章
# 2 下一篇指向新文章
# false 关闭
post_pagination: 1

# 文章过期提醒
noticeOutdate:
  enable: false
  # simple / flat
  style: flat
  # 超过多少天显示
  limit_day: 365
  # top / bottom
  position: top
  message_prev: 距离上次更新已过去
  message_next: 天，文章内容可能已过期。

# --------------------------------------
# 页脚设置
# --------------------------------------

footer:
  nav:
  owner:
    enable: true
    since: 2025
  # 主题与框架版权
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true
  hide: false
  # 是否显示隐藏按钮
  button: true
  mobile: true
  # left / right
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/xxxxxx
  card_announcement:
    enable: true
    content: 这是我的博客
  card_recent_post:
    enable: true
    limit: 5
    # date / updated
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 本地缓存时间（分钟）
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    # none / true / false
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    # random / name / length
    orderby: random
    # 1 升序 / -1 降序
    order: 1
    sort_order:
  card_archives:
    enable: true
    # monthly / yearly
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date:

# --------------------------------------
# 右下角按钮
# --------------------------------------

# 距离底部的高度
rightside_bottom:

# 繁简体转换
translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

# 阅读模式
readmode: true

# 深色模式
darkmode:
  enable: true
  button: true
  autoChangeMode: false
  start:
  end:

# 显示滚动百分比
rightside_scroll_percent: false

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 150

# 字数统计（需安装插件）
wordcount:
  enable: false
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 不蒜子统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学公式
# --------------------------------------

math:
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    enableMenu: true
    tags: none

  katex:
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  use:
  placeholder:

  algolia_search:
    hitsPerPage: 6

  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8
    CDN:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  use: sharejs

  sharejs:
    sites: facebook,x,wechat,weibo,qq

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多支持两个评论系统，第一个为默认显示
  # 留空则不启用评论
  # 可选：Disqus / Disqusjs / Livere / Gitalk / Valine / Waline / Utterances
  #       Facebook Comments / Twikoo / Giscus / Remark42 / Artalk
  # 双评论系统格式示例：Disqus,Waline
  use:
  # 是否在按钮旁显示评论系统名称
  text: true
  # 懒加载：评论区进入视口后才加载
  # 启用后评论数统计将失效
  lazyload: false
  # 是否在文章顶部横幅显示评论数
  count: false
  # 是否在首页文章卡片显示评论数
  card_post_count: false

# Disqus 评论
# https://disqus.com/
disqus:
  shortname:
  # 最新评论组件所需
  apikey:

# Disqus 替代方案（基于 API 渲染）
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere 评论
# https://www.livere.com/
livere:
  uid:

# Gitalk 评论
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine 评论
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 国内自定义域名适用，海外自动识别
  serverURLs:
  bg:
  # 使用 Valine 访问量作为页面浏览量
  visitor: false
  option:

# Waline 评论（Valine 的后端版本）
# https://waline.js.org/
waline:
  serverURL:
  bg:
  # 使用 Waline 访问量作为页面浏览量
  pageview: false
  option:

# Utterances（基于 GitHub Issues）
# https://utteranc.es/
utterances:
  repo:
  # Issue 映射方式：pathname / url / title / og:title
  issue_term: pathname
  # 浅色主题
  light_theme: github-light
  # 深色主题
  dark_theme: photon-dark
  js:
  option:

# Facebook 评论插件
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  app_id:
  # 可选
  user_id:
  pageSize: 10
  # 排序方式：social / time / reverse_time
  order_by: social
  lang: en_US

# Twikoo 评论
# https://github.com/imaegoo/twikoo
twikoo:
  envId:
  region:
  # 使用 Twikoo 访问量作为页面浏览量
  visitor: false
  option:

# Giscus 评论
# https://giscus.app/
giscus:
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

# Remark42 评论
# https://remark42.com/docs/configuration/frontend/
remark42:
  host:
  siteId:
  option:

# Artalk 评论
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  # 使用 Artalk 访问量作为页面浏览量
  visitor: false
  option:

# --------------------------------------
# 在线聊天服务
# --------------------------------------

chat:
  # 可选：chatra / tidio / crisp
  # 留空则不启用
  use:
  # 右下角聊天按钮（推荐）
  # 启用后会隐藏原始按钮
  rightside_button: false
  # 向上滚动显示，向下滚动隐藏
  button_hide_show: false

# Chatra
# https://chatra.io/
chatra:
  id:

# Tidio
# https://www.tidio.com/
tidio:
  public_key:

# Crisp
# https://crisp.chat/en/
crisp:
  website_id:

# --------------------------------------
# 统计分析
# --------------------------------------

# 百度统计
# https://tongji.baidu.com/
baidu_analytics:

# Google Analytics
# https://analytics.google.com/
google_analytics:

# Cloudflare Analytics
# https://www.cloudflare.com/web-analytics/
cloudflare_analytics:

# Microsoft Clarity
# https://clarity.microsoft.com/
microsoft_clarity:

# Umami 统计
# https://umami.is/
umami_analytics:
  enable: false
  # 自建 Umami 服务地址
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    # Umami Cloud（API Key）或自建 Token
    token:

# Google Tag Manager
# https://www.googletagmanager.com/
google_tag_manager:
  tag_id:
  # 可选
  domain:

# --------------------------------------
# 广告设置
# --------------------------------------

# Google Adsense
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动插入广告
ad:
  # 首页（每三篇文章）
  index:
  # 侧边栏
  aside:
  # 文章分页前
  post:

# --------------------------------------
# 站点验证
# --------------------------------------

site_verification:
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# --------------------------------------
# 美化 / 特效
# --------------------------------------

# 主题色自定义
# 注意：颜色值必须使用双引号
# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类 / 标签页面 UI
# index：首页样式 / default：归档样式
category_ui:
tag_ui:

# UI 圆角
rounded_corners_ui: true

# 两端对齐文本
text_align_justify: false

# 页头 / 页脚遮罩
mask:
  header: true
  footer: true

# 页面加载动画
preloader:
  enable: false
  # 1 全屏加载
  # 2 进度条
  source: 1
  # pace 主题
  pace_css_url:

# 页面切换动画
enter_transitions: true

# 默认显示模式
display_mode: light

# --------------------------------------
# 背景特效
# --------------------------------------

# 彩带背景（canvas_ribbon）
# 项目地址：https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 彩带尺寸
  size: 150
  # 彩带透明度（0 ~ 1）
  alpha: 0.6
  # 层级
  zIndex: -1
  # 点击更换样式
  click_to_change: false
  # 是否在移动端启用
  mobile: false

# 飘动彩带
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# 粒子连线背景（canvas_nest）
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false
  # 线条颜色，默认 '0,0,0'，RGB 格式
  color: '0,0,255'
  # 线条透明度（0~1）
  opacity: 0.7
  # 背景层级
  zIndex: -1
  # 连线数量
  count: 99
  mobile: false

# 鼠标点击特效：烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击特效：爱心
click_heart:
  enable: false
  mobile: false

# 鼠标点击特效：文字
clickShowText:
  enable: false
  text:
    # - 我
    # - 爱
    # - 你
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# 图片灯箱
# --------------------------------------

# 可选：fancybox / medium_zoom
# fancybox：https://fancyapps.com/fancybox/
# medium_zoom：https://github.com/francoischalifour/medium-zoom
# 留空表示不启用
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列文章
series:
  enable: false
  # 排序方式：title / date
  orderBy: 'title'
  # 排序顺序：1 升序 / -1 降序
  order: 1
  number: true

# ABCJS 乐谱插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid 流程图
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # 是否使用代码块方式书写
  code_write: false
  # 内置主题：default / forest / dark / neutral
  theme:
    light: default
    dark: dark

# Chart.js 图表
# https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 以下配置仅在未指定 MD 参数时生效
  # 图表通用字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表通用边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图 / 极地图刻度背景色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note 提示块（Bootstrap Callout）
note:
  # 样式：
  # simple  旧版 alert 风格（默认）
  # modern  新版 callout 风格
  # flat    扁平风格（类似 Mozilla / StackOverflow）
  # disabled 禁用所有样式
  style: flat
  icons: true
  border_radius: 3
  # 背景亮度偏移（百分比）
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# PJAX 无刷新加载
# https://github.com/MoOx/pjax
pjax:
  enable: false
  # 排除指定页面
  exclude:
    # - /music/

# APlayer / Meting 注入
aplayerInject:
  enable: false
  per_page: true

# Snackbar 提示框
# https://github.com/polonel/SnackBar
snackbar:
  enable: false
  # 位置：
  # top-left / top-center / top-right
  # bottom-left / bottom-center / bottom-right
  position: bottom-left
  # 浅色模式背景色
  bg_light: '#49b1f5'
  # 深色模式背景色
  bg_dark: '#1f1f1f'

# Instant.page 预加载
# https://instant.page/
instantpage: false

# 图片懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: false
  # 使用浏览器原生 lazyload
  native: false
  # 生效范围：site / post
  field: site
  placeholder:
  blur: false

# --------------------------------------
# PWA
# --------------------------------------

# 离线支持
# https://github.com/JLHwung/hexo-offline
pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

# --------------------------------------
# Open Graph 元信息
# --------------------------------------

# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  enable: true
  option:
    # twitter_card:
