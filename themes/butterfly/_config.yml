# --------------------------------------
# 结构化数据
# --------------------------------------

# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: false
  # 网站别名（用于结构化数据）
  # 示例：['name1', 'name2']
  alternate_name:

# --------------------------------------
# CSS 兼容前缀
# --------------------------------------

# 是否自动添加浏览器前缀
css_prefix: true

# --------------------------------------
# 代码注入
# --------------------------------------

# 向 <head> 和 </body> 前注入代码
inject:
  head:
    # - <link rel="stylesheet" href="/xxx.css">
    - <link rel="stylesheet" href="/css/background.css">
  bottom:
    # - <script src="xxxx"></script>
    - <script src="stylesheet"></js/background.js>

# --------------------------------------
# CDN 设置
# --------------------------------------

CDN:
  # 内部与第三方资源 CDN 提供商
  # 可选：local / jsdelivr / unpkg / cdnjs / custom
  # Dev 版本内部资源只能使用 local
  internal_provider: local
  third_party_provider: jsdelivr

  # 是否在 URL 中添加版本号
  version: true

  # 自定义 CDN 格式
  # 示例：https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format:

